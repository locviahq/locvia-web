<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Contact Locvia support">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; form-action 'self' https://api.web3forms.com; img-src 'self' data:; connect-src 'self' https://api.web3forms.com;">
<title>Contact Us — Locvia</title>
<link rel="stylesheet" href="style.css">
<style>
  .contact-hero {
    background: var(--navy-950);
    padding: 70px 24px 90px;
    text-align: center;
  }
  .contact-hero .legal-eyebrow { display: block; margin-bottom: 12px; }
  .contact-hero h1 { color: var(--white); font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
  .contact-hero h1 em { font-family: var(--font-accent); font-style: italic; font-weight: 500; color: var(--marigold-500); }
  .contact-hero p { color: var(--mist-400); font-size: 15px; max-width: 440px; margin: 0 auto; }

  .contact-wrap { max-width: 520px; margin: -50px auto 60px; padding: 0 24px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink-900); }
  .form-row input, .form-row textarea {
    width: 100%; padding: 13px 16px; border-radius: 10px;
    border: 1.5px solid var(--ink-300); font-size: 14px; font-family: inherit;
    background: var(--cloud-50); color: var(--ink-900);
  }
  .form-row textarea { resize: vertical; min-height: 110px; }
  .form-row input:focus, .form-row textarea:focus { outline: none; border-color: var(--indigo-500); }
  #formMsg { margin-top: 14px; font-size: 13.5px; font-weight: 600; text-align: center; display: none; }
  #formMsg.success { color: #16A34A; display: block; }
  #formMsg.error { color: #DC2626; display: block; }
  .hp-field { position: absolute; left: -9999px; top: -9999px; opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="nav-logo-mark">L</span> Locvia</a>
    <ul class="nav-links">
      <li><a href="privacy.html">Privacy</a></li>
      <li><a href="terms.html">Terms</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>
</nav>

<section class="contact-hero">
  <span class="legal-eyebrow" style="color:var(--indigo-400);">Support</span>
  <h1>Get in <em>touch</em></h1>
  <p>Questions, feedback, or need help with your account? Send us a message and we'll get back to you.</p>
</section>

<div class="contact-wrap">
  <div class="card" style="box-shadow: 0 20px 50px rgba(10,14,26,0.12);">
    <form id="contactForm">
      <input type="hidden" name="access_key" value="496a4619-2669-43f0-9398-20bf9f48786b">
      <input type="hidden" name="subject" value="New Locvia Contact Form Message">
      <input type="hidden" name="from_name" value="Locvia Contact Form">
      <input type="checkbox" name="botcheck" class="hp-field" tabindex="-1" autocomplete="off">

      <div class="form-row"><label>Name</label><input type="text" name="name" required></div>
      <div class="form-row"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-row"><label>Phone number registered with Locvia (if applicable)</label><input type="tel" name="phone"></div>
      <div class="form-row"><label>Message</label><textarea name="message" required></textarea></div>
      <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;">Send Message</button>
      <div id="formMsg"></div>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <ul class="footer-links">
      <li><a href="privacy.html">Privacy Policy</a></li>
      <li><a href="terms.html">Terms & Conditions</a></li>
      <li><a href="delete-account.html">Delete Account</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="footer-copy">© 2026 Locvia. All rights reserved.</div>
  </div>
</footer>

<script>
  const form = document.getElementById('contactForm');
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Sending...';
    msg.style.display = 'none';

    try {
      const formData = new FormData(form);
      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: formData
      });
      const result = await response.json();

      if (result.success) {
        msg.textContent = "Message sent! We'll get back to you soon.";
        msg.className = 'success';
        form.reset();
      } else {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.className = 'error';
      }
    } catch (err) {
      msg.textContent = 'Network error. Please check your connection and try again.';
      msg.className = 'error';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Message';
    }
  });
</script>

</body>
</html>
