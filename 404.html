<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
<title>Page Not Found — Locvia</title>
<link rel="stylesheet" href="style.css">
<style>
  .notfound {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy-950);
    text-align: center;
    padding: 40px 24px;
  }
  .notfound-inner { position: relative; z-index: 2; }
  .notfound .code {
    font-family: var(--font-accent);
    font-style: italic;
    font-weight: 500;
    font-size: 96px;
    color: var(--marigold-500);
    line-height: 1;
  }
  .notfound h1 {
    color: var(--white);
    font-size: 26px;
    font-weight: 800;
    margin: 16px 0 10px;
  }
  .notfound p {
    color: var(--mist-400);
    font-size: 15px;
    margin-bottom: 28px;
  }
  .radar-ring-mini {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(107,140,255,0.2);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .rm1 { width: 400px; height: 400px; }
  .rm2 { width: 280px; height: 280px; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="nav-logo-mark">L</span> Locvia</a>
    <ul class="nav-links">
      <li><a href="privacy.html">Privacy</a></li>
      <li><a href="terms.html">Terms</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>
</nav>

<section class="notfound">
  <div class="radar-ring-mini rm1"></div>
  <div class="radar-ring-mini rm2"></div>
  <div class="notfound-inner">
    <div class="code">404</div>
    <h1>Nothing here, near you.</h1>
    <p>This page doesn't exist — but your neighbourhood marketplace does.</p>
    <a href="index.html" class="btn btn-primary">Back to Home</a>
  </div>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <ul class="footer-links">
      <li><a href="privacy.html">Privacy Policy</a></li>
      <li><a href="terms.html">Terms & Conditions</a></li>
      <li><a href="delete-account.html">Delete Account</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="footer-copy">© 2026 Locvia. All rights reserved.</div>
  </div>
</footer>

</body>
</html>
